# Production override — apply with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Hardening (P0a-3, matrix A7/A8/A10):
#   - A8: every internal service stops publishing host ports (`ports: !reset []`); only nginx
#         (80/443) is reachable from outside. Internal services talk over the compose network.
#   - A10: ecm-core runs the hardened `prod` Spring profile with required, fail-fast env
#          (${VAR:?required}); Elasticsearch security is enabled; MinIO/Grafana admin creds are
#          required env (no weak defaults). Prometheus has no auth mechanism today — it is simply
#          not published (A8); external Prometheus access is a separate future item.
#
# Runtime boot of this override (ES auth, prod profile up) is validated in gate item B4
# (needs the Docker daemon + real secrets). `docker compose config` validates the merged shape.
services:
  ecm-core:
    ports: !reset []
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:?required}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:?required}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:?required}
      - SPRING_ELASTICSEARCH_URIS=http://elasticsearch:9200
      - SPRING_ELASTICSEARCH_USERNAME=elastic
      - SPRING_ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD:?required}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD:?required}
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_USERNAME=${RABBITMQ_USER:?required}
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:?required}
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=${ECM_JWT_ISSUER_URI:?required}
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI=${ECM_JWT_JWK_SET_URI:?required}
      - ECM_SECURITY_CORS_ALLOWED_ORIGINS=${ECM_SECURITY_CORS_ALLOWED_ORIGINS:?required}

  postgres:
    ports: !reset []
  postgres-keycloak:
    ports: !reset []
  postgres-odoo:
    ports: !reset []
  elasticsearch:
    ports: !reset []
    environment:
      - xpack.security.enabled=true
      # Internal network + ports closed (A8): basic auth over http, no TLS cert mgmt in v1.
      - xpack.security.http.ssl.enabled=false
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:?required}
  redis:
    ports: !reset []
  collabora:
    ports: !reset []
  rabbitmq:
    ports: !reset []
  greenmail:
    ports: !reset []
  minio:
    ports: !reset []
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:?required}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:?required}
  keycloak:
    ports: !reset []
    # B1: production mode. `start` (not start-dev) + KC_HTTP_ENABLED=true (prod HTTP listener is
    # off by default in KC23 — required when TLS terminates at nginx and KC speaks HTTP behind it).
    # KC_HOSTNAME makes issued tokens carry the public HTTPS issuer; realm is managed out-of-band
    # (no --import-realm), and volumes !reset [] drops the base realm-export import mount.
    command: ["start"]
    volumes: !reset []
    environment:
      - KC_HOSTNAME=${ECM_KEYCLOAK_PUBLIC_HOST:?required}
      - KC_PROXY_HEADERS=xforwarded
      - KC_HTTP_ENABLED=true
  ml-service:
    ports: !reset []
  clamav:
    ports: !reset []
  odoo:
    ports: !reset []
  ecm-frontend:
    ports: !reset []
  prometheus:
    ports: !reset []
  grafana:
    ports: !reset []
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:?required}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:?required}

  # B2: nginx becomes the TLS terminator. Swap in the prod config (dev nginx/nginx.conf stays
  # HTTP-only and untouched) + the shared business-location snippet. Certs are dropped into
  # ./nginx/ssl by the operator at cutover (cert.pem/key.pem); none are committed. 80/443 stay
  # the only published ports (A8).
  nginx:
    # !override replaces the whole base volume list (no merge ambiguity): swap dev nginx.conf for
    # nginx.prod.conf, add the shared locations snippet, keep ssl + logs.
    volumes: !override
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/athena-locations.conf:/etc/nginx/athena-locations.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
