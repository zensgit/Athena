spring:
  application:
    name: ecm-core
  
  datasource:
    url: jdbc:postgresql://localhost:5432/ecm_db
    username: ecm_user
    password: ecm_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
        types:
          print:
            banner: false
    show-sql: false
  
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true
  
  elasticsearch:
    uris: http://localhost:9200
    username: elastic
    password: elastic_password
    connection-timeout: 5s
    socket-timeout: 30s
  
  data:
    redis:
      host: localhost
      port: 6379
      password: redis_password
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  
  rabbitmq:
    host: localhost
    port: 5672
    username: rabbitmq
    password: rabbitmq_password
    virtual-host: /
  
  servlet:
    multipart:
      enabled: true
      max-file-size: 500MB
      max-request-size: 500MB
  
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://keycloak:8080/realms/ecm}
          jwk-set-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI:http://keycloak:8080/realms/ecm/protocol/openid-connect/certs}

flowable:
  database-schema-update: true
  async-executor-activate: true
  history-level: full
  
jodconverter:
  local:
    enabled: ${JODCONVERTER_LOCAL_ENABLED:false}
    office-home: ${JODCONVERTER_LOCAL_OFFICE_HOME:/usr/lib/libreoffice}
    port-numbers: 2002
    max-tasks-per-process: 10
    process-timeout: 120000

ecm:
  cmis:
    repository-id: ${ECM_CMIS_REPOSITORY_ID:athena}

  audit:
    retention-days: ${ECM_AUDIT_RETENTION_DAYS:365}
    disabled-categories: ${ECM_AUDIT_DISABLED_CATEGORIES:}

  mfa:
    issuer: ${ECM_MFA_ISSUER:Athena ECM}

  email:
    enabled: ${ECM_EMAIL_ENABLED:false}
    from-address: ${ECM_EMAIL_FROM_ADDRESS:}

  transfer:
    repository-id: ${ECM_TRANSFER_REPOSITORY_ID:${ecm.cmis.repository-id}}

  mail:
    processed:
      retention-days: ${ECM_MAIL_PROCESSED_RETENTION_DAYS:90}
    reporting:
      export:
        enabled: ${ECM_MAIL_REPORT_EXPORT_ENABLED:false}
        cron: ${ECM_MAIL_REPORT_EXPORT_CRON:0 5 2 * * *}
        folder-id: ${ECM_MAIL_REPORT_EXPORT_FOLDER_ID:}
        days: ${ECM_MAIL_REPORT_EXPORT_DAYS:30}
        account-id: ${ECM_MAIL_REPORT_EXPORT_ACCOUNT_ID:}
        rule-id: ${ECM_MAIL_REPORT_EXPORT_RULE_ID:}

  identity:
    provider: ${ECM_IDENTITY_PROVIDER:local}

  keycloak:
    url: ${ECM_KEYCLOAK_URL:http://keycloak:8080}
    realm: ${ECM_KEYCLOAK_REALM:ecm}
    admin-realm: ${ECM_KEYCLOAK_ADMIN_REALM:master}
    admin-client-id: ${ECM_KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
    admin-username: ${ECM_KEYCLOAK_ADMIN_USERNAME:}
    admin-password: ${ECM_KEYCLOAK_ADMIN_PASSWORD:}

  ldap:
    url: ${ECM_LDAP_URL:ldap://localhost:389}
    bind-dn: ${ECM_LDAP_BIND_DN:}
    bind-password: ${ECM_LDAP_BIND_PASSWORD:}
    user-base-dn: ${ECM_LDAP_USER_BASE_DN:}
    user-filter: ${ECM_LDAP_USER_FILTER:(objectClass=person)}
    user-username-attribute: ${ECM_LDAP_USER_USERNAME_ATTRIBUTE:uid}
    user-email-attribute: ${ECM_LDAP_USER_EMAIL_ATTRIBUTE:mail}
    user-first-name-attribute: ${ECM_LDAP_USER_FIRST_NAME_ATTRIBUTE:givenName}
    user-last-name-attribute: ${ECM_LDAP_USER_LAST_NAME_ATTRIBUTE:sn}
    user-display-name-attribute: ${ECM_LDAP_USER_DISPLAY_NAME_ATTRIBUTE:displayName}
    user-department-attribute: ${ECM_LDAP_USER_DEPARTMENT_ATTRIBUTE:department}
    user-job-title-attribute: ${ECM_LDAP_USER_JOB_TITLE_ATTRIBUTE:title}
    user-external-id-attribute: ${ECM_LDAP_USER_EXTERNAL_ID_ATTRIBUTE:entryUUID}
    user-enabled-attribute: ${ECM_LDAP_USER_ENABLED_ATTRIBUTE:}
    group-base-dn: ${ECM_LDAP_GROUP_BASE_DN:}
    group-filter: ${ECM_LDAP_GROUP_FILTER:(|(objectClass=groupOfNames)(objectClass=group)(objectClass=groupOfUniqueNames))}
    group-name-attribute: ${ECM_LDAP_GROUP_NAME_ATTRIBUTE:cn}
    group-display-name-attribute: ${ECM_LDAP_GROUP_DISPLAY_NAME_ATTRIBUTE:displayName}
    group-description-attribute: ${ECM_LDAP_GROUP_DESCRIPTION_ATTRIBUTE:description}
    group-email-attribute: ${ECM_LDAP_GROUP_EMAIL_ATTRIBUTE:mail}
    group-external-id-attribute: ${ECM_LDAP_GROUP_EXTERNAL_ID_ATTRIBUTE:entryUUID}
    group-member-attribute: ${ECM_LDAP_GROUP_MEMBER_ATTRIBUTE:member}
    connect-timeout-ms: ${ECM_LDAP_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${ECM_LDAP_READ_TIMEOUT_MS:10000}
    sync:
      enabled: ${ECM_LDAP_SYNC_ENABLED:false}
      cron: ${ECM_LDAP_SYNC_CRON:0 0 */4 * * *}

  storage:
    type: filesystem
    root-path: /var/ecm/content
    temp-path: /var/ecm/temp

  tika:
    max-text-length: 10485760  # 10MB of text

  security:
    jwt:
      secret: ${JWT_SECRET:mySecretKey}
      expiration: 86400000
    secret:
      enabled: ${ECM_SECURITY_SECRET_ENABLED:false}
      active-key-version: ${ECM_SECURITY_SECRET_ACTIVE_KEY_VERSION:v1}
      keys:
        v1: ${ECM_SECURITY_SECRET_KEY_V1:}
    cors:
      allowed-origins: "*"
      allowed-methods: "*"
      allowed-headers: "*"
      exposed-headers: "Authorization,Link,X-Total-Count"
      allow-credentials: true
      max-age: 3600

  site:
    membership:
      persistence:
        enabled: ${ECM_SITE_MEMBERSHIP_PERSISTENCE_ENABLED:true}
      legacy-reader:
        enabled: ${ECM_SITE_MEMBERSHIP_LEGACY_READER_ENABLED:true}
  
  preview:
    cache:
      enabled: true
      ttl: 3600
    max-pages: 50
    thumbnail:
      width: 200
      height: 200
      quality: 0.8
    trace:
      enabled: ${ECM_PREVIEW_TRACE_ENABLED:true}
      max-requests: ${ECM_PREVIEW_TRACE_MAX_REQUESTS:100}
      max-events-per-request: ${ECM_PREVIEW_TRACE_MAX_EVENTS_PER_REQUEST:80}
    cad:
      enabled: ${ECM_PREVIEW_CAD_ENABLED:true}
      render-url: ${ECM_PREVIEW_CAD_RENDER_URL:}
      render-fallback-urls: ${ECM_PREVIEW_CAD_RENDER_FALLBACK_URLS:}
      auth-token: ${ECM_PREVIEW_CAD_AUTH_TOKEN:}
      timeout-ms: ${ECM_PREVIEW_CAD_TIMEOUT_MS:30000}
      circuit-breaker:
        enabled: ${ECM_PREVIEW_CAD_CIRCUIT_BREAKER_ENABLED:true}
        failure-threshold: ${ECM_PREVIEW_CAD_CIRCUIT_BREAKER_FAILURE_THRESHOLD:3}
        open-ms: ${ECM_PREVIEW_CAD_CIRCUIT_BREAKER_OPEN_MS:120000}
        half-open-timeout-ms: ${ECM_PREVIEW_CAD_CIRCUIT_BREAKER_HALF_OPEN_TIMEOUT_MS:30000}
    queue:
      enabled: ${ECM_PREVIEW_QUEUE_ENABLED:true}
      poll-interval-ms: ${ECM_PREVIEW_QUEUE_POLL_INTERVAL_MS:2000}
      batch-size: ${ECM_PREVIEW_QUEUE_BATCH_SIZE:2}
      max-attempts: ${ECM_PREVIEW_QUEUE_MAX_ATTEMPTS:3}
      retry-delay-ms: ${ECM_PREVIEW_QUEUE_RETRY_DELAY_MS:60000}
      run-as-user: ${ECM_PREVIEW_QUEUE_RUN_AS_USER:admin}
    preflight:
      enabled: ${ECM_PREVIEW_PREFLIGHT_ENABLED:true}
      max-source-size-bytes: ${ECM_PREVIEW_PREFLIGHT_MAX_SOURCE_SIZE_BYTES:268435456}
      max-source-size-bytes-by-route: ${ECM_PREVIEW_PREFLIGHT_MAX_SOURCE_SIZE_BYTES_BY_ROUTE:cad:536870912,office:209715200,pdf:268435456,image:157286400,text:104857600}
    read:
      hash-enforce:
        enabled: ${ECM_PREVIEW_READ_HASH_ENFORCE_ENABLED:true}
      auto-repair-on-stale: ${ECM_PREVIEW_READ_AUTO_REPAIR_ON_STALE:true}
    prevention:
      enabled: ${ECM_PREVIEW_PREVENTION_ENABLED:true}
      redis:
        enabled: ${ECM_PREVIEW_PREVENTION_REDIS_ENABLED:true}
      max-blocked: ${ECM_PREVIEW_PREVENTION_MAX_BLOCKED:5000}
      ttl-ms: ${ECM_PREVIEW_PREVENTION_TTL_MS:604800000}
      auto-block-categories: ${ECM_PREVIEW_PREVENTION_AUTO_BLOCK_CATEGORIES:UNSUPPORTED,PERMANENT}
    dead-letter:
      enabled: ${ECM_PREVIEW_DEAD_LETTER_ENABLED:true}
      redis:
        enabled: ${ECM_PREVIEW_DEAD_LETTER_REDIS_ENABLED:true}
      max-entries: ${ECM_PREVIEW_DEAD_LETTER_MAX_ENTRIES:5000}
      ttl-ms: ${ECM_PREVIEW_DEAD_LETTER_TTL_MS:604800000}
      auto-replay:
        enabled: ${ECM_PREVIEW_DEAD_LETTER_AUTO_REPLAY_ENABLED:false}
        poll-interval-ms: ${ECM_PREVIEW_DEAD_LETTER_AUTO_REPLAY_POLL_INTERVAL_MS:30000}
        max-items: ${ECM_PREVIEW_DEAD_LETTER_AUTO_REPLAY_MAX_ITEMS:20}
        cooldown-ms: ${ECM_PREVIEW_DEAD_LETTER_AUTO_REPLAY_COOLDOWN_MS:300000}
        force: ${ECM_PREVIEW_DEAD_LETTER_AUTO_REPLAY_FORCE:false}
        categories: ${ECM_PREVIEW_DEAD_LETTER_AUTO_REPLAY_CATEGORIES:TEMPORARY}

  versioning:
    label-policy: ${ECM_VERSION_LABEL_POLICY:semantic}
    calendar:
      format: ${ECM_VERSION_CALENDAR_FORMAT:yyyy.MM.dd}
      include-sequence: ${ECM_VERSION_CALENDAR_INCLUDE_SEQUENCE:true}
      sequence-separator: ${ECM_VERSION_CALENDAR_SEQUENCE_SEPARATOR:.}
  
  conversion:
    output-formats:
      - pdf
      - html
      - txt
      - png
      - jpg
    max-file-size: 100MB
    timeout: 300000
  
  workflow:
    definitions-path: classpath:workflows/
    auto-deploy: true
  
  search:
    enabled: true
    index-name: ecm_documents
    batch-size: 100
    refresh-after-write: false
    highlight:
      enabled: true
      pre-tag: "<em>"
      post-tag: "</em>"
  
  alfresco:
    compatibility:
      enabled: true
      version: 7.0
  
  odoo:
    url: http://localhost:8069
    database: odoo_db
    username: admin
    password: admin_password
    api-key: ${ODOO_API_KEY:}

  antivirus:
    enabled: ${ECM_ANTIVIRUS_ENABLED:false}
    clamd:
      host: ${ECM_ANTIVIRUS_CLAMD_HOST:localhost}
      port: ${ECM_ANTIVIRUS_CLAMD_PORT:3310}
      timeout: ${ECM_ANTIVIRUS_CLAMD_TIMEOUT:30000}
    on-threat:
      action: reject  # reject or quarantine
      quarantine-path: /var/ecm/quarantine

logging:
  level:
    root: INFO
    com.ecm: DEBUG
    org.springframework.security: INFO
    org.flowable: WARN
    org.elasticsearch: WARN
    org.apache.pdfbox: WARN
    org.jodconverter: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/ecm-core.log
    max-size: 10MB
    max-history: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024
