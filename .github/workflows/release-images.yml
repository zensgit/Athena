name: Release images to ghcr.io

# Publish the three app images so a networked host can `docker pull` them
# instead of building from source. Triggered by pushing a v* tag (or manually).
#
# After the FIRST successful run, make the packages public if you want
# login-free pulls: GitHub → your packages → athena-* → Package settings →
# Change visibility → Public. Otherwise deploy hosts must `docker login ghcr.io`.
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: ecm-core
            context: ./ecm-core
            dockerfile: ./ecm-core/Dockerfile
          - service: ecm-frontend
            context: ./ecm-frontend
            dockerfile: ./ecm-frontend/Dockerfile
          - service: ml-service
            context: ./ml-service
            dockerfile: ./ml-service/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/athena-${{ matrix.service }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=sha,format=short

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
