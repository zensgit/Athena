name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  POSTGRES_DB: ecm_db
  POSTGRES_USER: ecm_user
  POSTGRES_PASSWORD: ecm_password
  REDIS_PASSWORD: redis_password
  RABBITMQ_USER: rabbitmq
  RABBITMQ_PASSWORD: rabbitmq_password
  MINIO_ACCESS_KEY: minio_access_key
  MINIO_SECRET_KEY: minio_secret_key
  KEYCLOAK_USER: admin
  KEYCLOAK_PASSWORD: admin
  KEYCLOAK_DB_USER: keycloak
  KEYCLOAK_DB_PASSWORD: keycloak_password
  ODOO_DB_USER: odoo
  ODOO_DB_PASSWORD: odoo_password
  ECM_API_PORT: "7700"
  ECM_FRONTEND_PORT: "5500"
  KEYCLOAK_PORT: "8180"

jobs:
  # ──────────────────────────────────────────────
  # Tier 1: Fast gates (no Docker, parallel)
  # ──────────────────────────────────────────────
  backend:
    name: Backend Verify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ecm-core

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile
        run: mvn -B -q compile

      - name: Unit tests
        run: mvn -B -q test -Dspring.profiles.active=test

  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ecm-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ecm-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx -p typescript@5.4.5 tsc --noEmit

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test -- --passWithNoTests --watchAll=false

  # ──────────────────────────────────────────────
  # Tier 2: Integration gates (Docker required)
  # ──────────────────────────────────────────────
  acceptance_smoke:
    name: Acceptance Smoke (3 admin pages)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ecm-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ecm-frontend
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Install Playwright browser
        working-directory: ecm-frontend
        run: npx playwright install --with-deps chromium

      - name: Generate .env files
        run: |
          cp .env.example .env
          # Override for CI: disable optional services
          sed -i 's/JODCONVERTER_LOCAL_ENABLED=.*/JODCONVERTER_LOCAL_ENABLED=false/' .env
          sed -i 's/ECM_PREVIEW_CAD_ENABLED=.*/ECM_PREVIEW_CAD_ENABLED=false/' .env
          sed -i 's/ECM_WOPI_ENABLED=.*/ECM_WOPI_ENABLED=false/' .env
          cat > .env.mail <<'ENVMAIL'
          # CI placeholder
          ENVMAIL

      - name: Build and start core stack
        run: |
          docker compose build ecm-core ecm-frontend
          docker compose up -d postgres postgres-keycloak redis elasticsearch minio rabbitmq
          # Wait for infra health
          for svc in postgres redis elasticsearch minio rabbitmq; do
            echo "Waiting for $svc..."
            timeout 120 bash -c "until docker inspect --format='{{.State.Health.Status}}' athena-${svc}-1 2>/dev/null | grep -q healthy; do sleep 3; done" || true
          done
          docker compose up -d keycloak
          echo "Waiting for keycloak..."
          timeout 120 bash -c "until docker inspect --format='{{.State.Health.Status}}' athena-keycloak-1 2>/dev/null | grep -q healthy; do sleep 5; done" || true
          docker compose up -d ecm-core
          echo "Waiting for ecm-core..."
          timeout 180 bash -c "until curl -sf http://localhost:7700/actuator/health >/dev/null 2>&1; do sleep 5; done"
          docker compose up -d ecm-frontend
          echo "Waiting for ecm-frontend..."
          timeout 60 bash -c "until curl -sf http://localhost:5500/ >/dev/null 2>&1; do sleep 3; done"
          echo "Stack ready."

      - name: Run acceptance smoke tests
        working-directory: ecm-frontend
        run: |
          ECM_UI_URL=http://localhost:5500 ECM_API_URL=http://localhost:7700 \
            npx playwright test e2e/frontend-acceptance-smoke.spec.ts \
              --project=chromium --workers=1

      - name: Capture docker logs (on failure)
        if: failure()
        run: |
          mkdir -p tmp/ci-smoke-logs
          for svc in ecm-core ecm-frontend keycloak postgres elasticsearch redis; do
            docker compose logs --no-color --tail=200 $svc > tmp/ci-smoke-logs/${svc}.log 2>&1 || true
          done

      - name: Upload artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-smoke-artifacts
          path: |
            ecm-frontend/playwright-report
            ecm-frontend/test-results
            tmp/ci-smoke-logs
          if-no-files-found: ignore

      - name: Shutdown stack
        if: always()
        run: docker compose down -v

  frontend_e2e_phase5_mocked:
    name: Phase 5 Mocked Regression Gate
    runs-on: ubuntu-latest
    needs: frontend
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ecm-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ecm-frontend
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Install Playwright browser
        working-directory: ecm-frontend
        run: npx playwright install --with-deps chromium

      - name: Run Phase 5 regression gate (mocked-first)
        run: CI=false bash scripts/phase5-regression.sh

      - name: Upload E2E artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-e2e-phase5-mocked-artifacts
          path: |
            ecm-frontend/playwright-report
            ecm-frontend/test-results
          if-no-files-found: ignore

  frontend_e2e_core:
    name: Frontend E2E Core Gate
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ecm-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ecm-frontend
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Install Playwright browser
        working-directory: ecm-frontend
        run: npx playwright install --with-deps chromium

      - name: Generate .env files
        run: |
          cp .env.example .env
          sed -i 's/JODCONVERTER_LOCAL_ENABLED=.*/JODCONVERTER_LOCAL_ENABLED=false/' .env
          sed -i 's/ECM_PREVIEW_CAD_ENABLED=.*/ECM_PREVIEW_CAD_ENABLED=false/' .env
          sed -i 's/ECM_WOPI_ENABLED=.*/ECM_WOPI_ENABLED=false/' .env
          cat > .env.mail <<'ENVMAIL'
          # CI placeholder
          ENVMAIL

      - name: Start E2E stack
        run: |
          docker compose build ecm-core ecm-frontend
          docker compose up -d postgres postgres-keycloak redis elasticsearch minio rabbitmq clamav
          for svc in postgres redis elasticsearch minio rabbitmq; do
            timeout 120 bash -c "until docker inspect --format='{{.State.Health.Status}}' athena-${svc}-1 2>/dev/null | grep -q healthy; do sleep 3; done" || true
          done
          docker compose up -d keycloak
          timeout 120 bash -c "until docker inspect --format='{{.State.Health.Status}}' athena-keycloak-1 2>/dev/null | grep -q healthy; do sleep 5; done" || true
          docker compose up -d ecm-core
          timeout 180 bash -c "until curl -sf http://localhost:7700/actuator/health >/dev/null 2>&1; do sleep 5; done"
          docker compose up -d ecm-frontend
          timeout 60 bash -c "until curl -sf http://localhost:5500/ >/dev/null 2>&1; do sleep 3; done"

      - name: Wait for Keycloak realm
        run: |
          timeout 60 bash -c "until curl -sf http://localhost:8180/realms/ecm/.well-known/openid-configuration >/dev/null 2>&1; do sleep 5; done"

      - name: Run core E2E gate
        working-directory: ecm-frontend
        run: |
          ECM_UI_URL=http://localhost:5500 ECM_API_URL=http://localhost:7700 ECM_E2E_WORKERS=1 \
            npx playwright test --workers=1 \
              e2e/browse-acl.spec.ts \
              e2e/mfa-settings.spec.ts \
              e2e/pdf-preview.spec.ts \
              e2e/permissions-dialog.spec.ts \
              e2e/permission-templates.spec.ts \
              e2e/rules-manual-backfill-validation.spec.ts \
              e2e/search-highlight.spec.ts \
              e2e/search-sort-pagination.spec.ts \
              e2e/search-view.spec.ts \
              e2e/version-details.spec.ts \
              e2e/version-share-download.spec.ts
          ECM_UI_URL=http://localhost:5500 ECM_API_URL=http://localhost:7700 ECM_E2E_WORKERS=1 \
            npx playwright test --workers=1 e2e/ui-smoke.spec.ts \
              --grep 'UI smoke: PDF upload \+ search \+ version history \+ preview|UI search download failure shows error toast'

      - name: Run preview/search regression gate
        working-directory: ecm-frontend
        run: |
          ECM_UI_URL=http://localhost:5500 ECM_API_URL=http://localhost:7700 ECM_E2E_WORKERS=1 \
            npm run e2e:preview-search:regression -- --workers=1
          ECM_UI_URL=http://localhost:5500 ECM_API_URL=http://localhost:7700 ECM_E2E_WORKERS=1 \
            npx playwright test --workers=1 e2e/search-suggestions-save-search.integration.spec.ts

      - name: Capture docker logs (on failure)
        if: failure()
        run: |
          mkdir -p tmp/ci-e2e-logs
          for svc in ecm-core ecm-frontend keycloak postgres elasticsearch redis clamav; do
            docker compose logs --no-color --tail=200 $svc > tmp/ci-e2e-logs/${svc}.log 2>&1 || true
          done

      - name: Upload E2E artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-e2e-core-artifacts
          path: |
            ecm-frontend/playwright-report
            ecm-frontend/test-results
            tmp/ci-e2e-logs
          if-no-files-found: ignore

      - name: Shutdown E2E stack
        if: always()
        run: docker compose down -v

  phase_c_security:
    name: Phase C Security Verification
    runs-on: ubuntu-latest
    needs: backend
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Generate .env files
        run: |
          cp .env.example .env
          sed -i 's/ECM_API_PORT=.*/ECM_API_PORT=8080/' .env
          sed -i 's/JODCONVERTER_LOCAL_ENABLED=.*/JODCONVERTER_LOCAL_ENABLED=false/' .env
          sed -i 's/ECM_WOPI_ENABLED=.*/ECM_WOPI_ENABLED=false/' .env
          sed -i 's/ECM_ANTIVIRUS_ENABLED=.*/ECM_ANTIVIRUS_ENABLED=false/' .env
          sed -i 's/ECM_PREVIEW_CAD_ENABLED=.*/ECM_PREVIEW_CAD_ENABLED=false/' .env
          cat > .env.mail <<'ENVMAIL'
          # CI placeholder
          ENVMAIL

      - name: Start verification stack
        run: |
          docker compose up -d postgres postgres-keycloak redis elasticsearch minio rabbitmq
          for svc in postgres redis elasticsearch minio rabbitmq; do
            timeout 120 bash -c "until docker inspect --format='{{.State.Health.Status}}' athena-${svc}-1 2>/dev/null | grep -q healthy; do sleep 3; done" || true
          done
          docker compose up -d keycloak
          timeout 120 bash -c "until docker inspect --format='{{.State.Health.Status}}' athena-keycloak-1 2>/dev/null | grep -q healthy; do sleep 5; done" || true
          docker compose build --build-arg SKIP_LIBREOFFICE=true ecm-core
          docker compose up -d ecm-core
          timeout 240 bash -c "until curl -sf http://localhost:8080/actuator/health >/dev/null 2>&1; do sleep 5; done"

      - name: Run Phase C verification
        run: |
          ./scripts/verify.sh --no-restart --smoke-only --skip-build --skip-wopi

      - name: Collect verification logs (on failure)
        if: failure()
        run: |
          ls -la tmp || true
          latest_log="$(ls -t tmp/*verify-phase-c.log 2>/dev/null | head -n 1)"
          if [[ -n "${latest_log}" ]]; then
            echo "Latest verify-phase-c log: ${latest_log}"
            tail -n 200 "${latest_log}" || true
          fi
          docker compose logs --tail=200 ecm-core || true
          docker compose logs --tail=200 keycloak || true

      - name: Upload verification logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: phase-c-logs
          path: tmp
          if-no-files-found: ignore

      - name: Shutdown stack
        if: always()
        run: docker compose down -v
