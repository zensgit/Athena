# Athena production nginx config (B1/B2, matrix §8.3).
#
# Swapped in ONLY by docker-compose.prod.yml (the dev nginx/nginx.conf is left untouched, HTTP-only).
# Port 80 is redirect-only; all business locations are served over TLS on 443 via the shared
# include (athena-locations.conf). Hardened security headers live here at 443 server scope.
#
# RUNTIME CUTOVER IS OWNER/OPS: real certs must be dropped into ./nginx/ssl (cert.pem/key.pem) and
# `server_name` set to the real domain. This file ships NO real domain and NO certs.

events {
    worker_connections 1024;
}

http {
    # Docker DNS resolver (prevents stale upstream IPs after container recreate)
    resolver 127.0.0.11 ipv6=off valid=30s;
    resolver_timeout 5s;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 500M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Rate limiting (zones referenced by athena-locations.conf)
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=2r/s;

    # Upstream services
    upstream ecm_backend {
        zone ecm_backend 64k;
        server ecm-core:8080 resolve;
    }

    upstream ecm_frontend {
        zone ecm_frontend 64k;
        server ecm-frontend:80 resolve;
    }

    upstream keycloak_backend {
        zone keycloak_backend 64k;
        server keycloak:8080 resolve;
    }

    # ----------------------------------------------------------------------------
    # Port 80 — redirect-only. No business locations, no security headers.
    # (No ACME challenge passthrough in v1; cert automation is owner/cert-tooling.)
    # ----------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ----------------------------------------------------------------------------
    # Port 443 — TLS terminator. Hardened headers at server scope, business
    # locations via the shared include. `server_name _` is a placeholder — the
    # operator sets the real domain at cutover.
    # ----------------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # Hardened security headers (HTTPS): CSP without bare `http:`, plus HSTS.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Content-Security-Policy "default-src 'self' https: data: blob: 'unsafe-inline'" always;

        include /etc/nginx/athena-locations.conf;
    }
}
