# Athena business location blocks — shared snippet (B1/B2, matrix §8.3).
#
# LOCATIONS ONLY. Do NOT add `add_header` security headers here: those live at the 443 `server`
# scope in nginx.prod.conf so they apply once, without drifting into the port-80 redirect server.
# This file is `include`d by the HTTPS server in nginx.prod.conf. It references the http-scope
# upstreams (ecm_backend/ecm_frontend) and rate-limit zones (api/upload) defined by that file.

# API endpoints
location /api/ {
    limit_req zone=api burst=20 nodelay;

    proxy_pass http://ecm_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 300s;

    # Buffer settings
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
}

# File upload endpoints
location ~ ^/api/v1/(documents/upload|nodes/.*/content) {
    limit_req zone=upload burst=5 nodelay;

    proxy_pass http://ecm_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Extended timeouts for file uploads
    proxy_connect_timeout 60s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;

    # Disable buffering for large files
    proxy_buffering off;
    proxy_request_buffering off;
}

# Same-origin Keycloak endpoints. This lets deployed frontends use the current
# origin for OIDC instead of sending browsers to localhost:8180 or a separate
# host that may not exist in staging.
location ^~ /realms/ {
    proxy_pass http://keycloak_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Port $server_port;
}

# Keycloak login pages load static resources from /resources/...
location ^~ /resources/ {
    proxy_pass http://keycloak_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Port $server_port;
}

# Swagger UI (disabled at the app in prod via springdoc; proxy kept for parity → app returns 404)
location /swagger-ui/ {
    proxy_pass http://ecm_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Actuator endpoints (restricted to internal networks; app also gates non-health in prod, A4)
location /actuator/ {
    allow 127.0.0.1;
    allow 172.16.0.0/12;
    deny all;

    proxy_pass http://ecm_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Frontend application
location / {
    proxy_pass http://ecm_frontend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Health check
location /health {
    access_log off;
    return 200 "healthy\n";
    add_header Content-Type text/plain;
}
